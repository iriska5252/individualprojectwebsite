<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bite-Art — Преобразование пароля</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="nav-panel">
        <a class="nav-btn" href="/">Home</a>
        <a class="nav-btn" href="/password">Password</a>
        <a class="nav-btn" href="/image">Image</a>
    </nav>

    <main class="page-main">
        <h1>Преобразование пароля</h1>

        <form class="card-form" action="/password" method="post">
            <input
                type="text"
                name="password"
                placeholder="Введите пароль (4-15 символов)"
                minlength="4"
                maxlength="15"
                required
            >
            <button type="submit" class="main-btn">Готово</button>
        </form>

        {% if error %}
            <p class="error-text">{{ error }}</p>
        {% endif %}

        {% if image_data %}
            <section class="result-card">
                <h2>Созданное изображение</h2>
                <img src="data:image/png;base64,{{ image_data }}" alt="Сгенерированное изображение">
                <a class="main-btn" download="password_image.png" href="data:image/png;base64,{{ image_data }}">Скачать</a>
            </section>
        {% endif %}
    </main>
</body>
</html>
